<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizAgent — 商务智能助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Calistoga&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0a1628;
    --navy-light: #132240;
    --navy-mid:   #1a3050;
    --blue:       #0052FF;
    --blue-light: #4D7CFF;
    --blue-bg:    #eef4ff;
    --gold:       #f59e0b;
    --gold-light: #fef3c7;
    --gray-50:    #FAFAFA;
    --gray-100:   #F1F5F9;
    --gray-200:   #E2E8F0;
    --gray-300:   #CBD5E1;
    --gray-400:   #94A3B8;
    --gray-500:   #64748B;
    --gray-600:   #475569;
    --gray-700:   #334155;
    --gray-800:   #1E293B;
    --gray-900:   #0F172A;
    --red:        #ef4444;
    --green:      #22c55e;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:  0 4px 6px rgba(0,0,0,.07);
    --shadow-lg:  0 10px 15px rgba(0,0,0,.08);
    --shadow-xl:  0 20px 25px rgba(0,0,0,.1);
    --shadow-accent: 0 4px 14px rgba(0,82,255,0.25);
    --font:       "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --font-display: "Calistoga", Georgia, serif;
    --font-mono:  "JetBrains Mono", "SF Mono", "Cascadia Code", "Fira Code", monospace;
    --transition: all .2s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; overflow: hidden; }
  body {
    height: 100%; overflow: hidden; font-family: var(--font); font-size: 14px; color: var(--gray-800);
    background: var(--gray-50); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width, 272px); min-width: 0; background: #fff;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    transition: width .25s ease, min-width .25s ease;
    border-right: 1px solid var(--gray-200);
  }
  .sidebar.collapsed { width: 0 !important; min-width: 0 !important; padding: 0; border: none; overflow: hidden; border-right: none; }
  .sidebar.collapsed .sidebar-brand,
  .sidebar.collapsed .sidebar-content,
  .sidebar.collapsed .sidebar-footer { display: none; }
  /* Resize handle */
  .sidebar-resizer {
    position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
    cursor: col-resize; z-index: 10; background: transparent;
    transition: background .2s;
  }
  .sidebar-resizer:hover,
  .sidebar-resizer.active { background: rgba(0,82,255,.3); }

  /* Collapse/Expand buttons */
  .sidebar-expand-btn {
    display: none; position: absolute; z-index: 50;
    cursor: pointer; line-height: 1;
    align-items: center; justify-content: center;
    transition: var(--transition);
  }
  #sidebarCollapseMainBtn {
    top: 28px; right: 4px;
    width: 20px; height: 20px; border: none; background: transparent;
    color: var(--gray-400); font-size: 12px; border-radius: 4px;
  }
  #sidebarCollapseMainBtn:hover { color: var(--blue); background: rgba(0,82,255,.06); }
  #sidebarExpandBtn {
    left: 8px; top: 8px;
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--gray-200);
    background: #fff; color: var(--gray-500); box-shadow: var(--shadow-sm);
    font-size: 18px;
  }
  #sidebarExpandBtn:hover { background: var(--blue-bg); color: var(--blue); }
  body:not(.sidebar-hidden) #sidebarCollapseMainBtn { display: flex; }
  body.sidebar-hidden #sidebarExpandBtn { display: flex; }

  .sidebar::before {
    content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 0%, rgba(0,82,255,.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .sidebar-brand {
    padding: 28px 24px 20px; border-bottom: 1px solid var(--gray-200);
    position: relative;
  }
  .sidebar-brand .logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .sidebar-brand .logo-icon {
    width: 36px; height: 36px; background: linear-gradient(135deg, var(--blue), var(--blue-light));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 0;
    box-shadow: var(--shadow-accent); position: relative;
    animation: float-icon 4s ease-in-out infinite;
  }
  .sidebar-brand .logo-icon::before {
    content: ''; position: absolute; inset: -3px; border-radius: 13px;
    border: 1px dashed rgba(0,82,255,.12); animation: ring-rotate 60s linear infinite;
  }
  .sidebar-brand .logo-icon::after {
    content: ''; position: absolute; inset: -6px; border-radius: 16px;
    border: 1px solid rgba(0,82,255,.05); animation: ring-rotate 80s linear infinite reverse;
  }
  .sidebar-brand h1 {
    font-size: 20px; font-weight: 600; letter-spacing: .5px; font-family: 'Outfit', var(--font);
  }
  .sidebar-brand h1 .biz { color: var(--blue); text-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .sidebar-brand h1 .agent { color: var(--gray-600); text-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .sidebar-brand .subtitle { font-size: 12px; color: var(--gray-400); margin-top: 2px; letter-spacing: .3px; }

  .sidebar-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0; position: relative; }

  .sidebar-group { padding: 0 16px; margin-bottom: 20px; flex-shrink: 0; }
  .sidebar-group:last-child { margin-bottom: 0; }
  .sidebar-group.grow { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .sidebar-group.grow .history-list { flex: 1; min-height: 0; }
  .sidebar-group-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--gray-500); padding: 0 8px; margin-bottom: 8px; font-family: var(--font);
  }

  /* Hide emoji icons in all pills */
  .mode-pill .icon { display: none; }

  /* Mode pills — horizontal capsule toggle */
  #modeGroup {
    display: flex; flex-direction: row; gap: 0; padding: 3px;
    background: var(--gray-100); border-radius: 10px;
    position: relative;
  }
  #modeGroup .mode-pill {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 8px 6px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--gray-500); white-space: nowrap;
    transition: all .25s cubic-bezier(.4,0,.2,1); border: none;
    background: transparent; position: relative; z-index: 1;
  }
  #modeGroup .mode-pill:hover { color: var(--gray-700); }
  #modeGroup .mode-pill.active {
    color: var(--blue); background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.03);
  }
  #modeGroup .mode-pill .icon { font-size: 14px; flex-shrink: 0; width: auto; }

  /* Role pills — keep vertical list */
  #roleGroup { display: flex; flex-direction: column; gap: 2px; }
  #roleGroup .mode-pill {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--gray-600); transition: var(--transition); border: none;
    background: transparent; width: 100%; text-align: left; position: relative;
  }
  #roleGroup .mode-pill:hover { color: var(--blue); background: var(--gray-100); }
  #roleGroup .mode-pill.active { color: var(--blue); background: var(--blue-bg); }
  #roleGroup .mode-pill.active::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px;
    background: linear-gradient(to bottom, var(--blue), var(--blue-light)); border-radius: 0 3px 3px 0;
  }
  #roleGroup .mode-pill .icon { width: 22px; text-align: center; font-size: 17px; flex-shrink: 0; }


  .btn-new {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 8px; margin-top: 8px;
    border-radius: var(--radius-sm); border: 1px dashed var(--gray-300);
    background: transparent; color: var(--gray-500); cursor: pointer;
    font-size: 12px; font-weight: 500; transition: var(--transition);
  }
  .btn-new:hover { border-color: var(--blue); color: var(--blue); background: rgba(0,82,255,.06); }
  .btn-danger { border-color: rgba(239,68,68,.3) !important; color: #ef4444 !important; }
  .btn-danger:hover { border-color: #ef4444 !important; background: rgba(239,68,68,.1) !important; color: #ef4444 !important; }
  .btn-new-lg { padding: 10px; margin-top: 10px; font-size: 13px; border-style: solid; }

  /* History list */
  .sidebar-group-title { display: flex; align-items: center; justify-content: space-between; }
  .refresh-btn {
    font-size: 14px; color: var(--gray-500); cursor: pointer; transition: var(--transition);
    padding: 2px; border-radius: 4px;
  }
  .refresh-btn:hover { color: var(--blue); background: var(--blue-bg); }
  .refresh-btn.spin { animation: spin .6s linear; }
  .clear-btn {
    font-size: 14px; color: var(--gray-500); cursor: pointer; transition: var(--transition);
    padding: 2px; border-radius: 4px; margin-left: 2px; line-height: 1;
  }
  .clear-btn:hover { color: #ef4444; background: rgba(239,68,68,.15); }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .history-list { overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .history-empty { font-size: 12px; color: var(--gray-500); padding: 12px 8px; text-align: center; }
  .history-item {
    display: flex; flex-direction: column; gap: 4px; padding: 16px 18px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    color: var(--gray-600); transition: var(--transition);
    border: none; background: transparent; width: 100%; text-align: left;
    border-left: 3px solid transparent;
  }
  .history-item:hover { background: var(--gray-100); color: var(--gray-800); }
  .history-item.active {
    background: var(--blue-bg); color: var(--blue); border-left-color: var(--blue);
  }
  .history-item .h-preview {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 13px; line-height: 1.5;
  }
  .history-item .h-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--gray-500);
  }
  .history-item.active .h-meta { color: var(--gray-500); }
  .history-item .h-count {
    padding: 2px 6px; border-radius: 4px;
    background: var(--gray-100); font-size: 11px; color: var(--gray-500);
  }
  .history-item.active .h-count { background: rgba(0,82,255,.1); color: var(--blue); }
  .history-item .h-del {
    margin-left: auto; font-size: 16px; color: var(--gray-500); cursor: pointer;
    padding: 0 4px; border-radius: 4px; line-height: 1; transition: var(--transition);
    opacity: 0;
  }
  .history-item:hover .h-del { opacity: 1; }
  .history-item .h-del:hover { color: var(--red); background: rgba(239,68,68,.15); }

  .sidebar-footer {
    padding: 14px 24px; border-top: 1px solid var(--gray-200);
    font-size: 11px; color: var(--gray-500); display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.4); animation: pulse-dot 2s ease-in-out infinite; }
  .status-dot.offline { background: var(--red); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--gray-50); position: relative; }
  .main::before {
    content: ''; position: absolute; top: -20%; right: -10%; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,82,255,.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .topbar {
    display: none; align-items: center; gap: 12px; padding: 12px 24px;
    background: #fff; border-bottom: 1px solid var(--gray-200); flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .topbar .toggle-sidebar {
    background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-500); padding: 4px;
  }
  .topbar h2 { font-size: 16px; font-weight: 600; color: var(--gray-800); font-family: var(--font-display); letter-spacing: .01em; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .sidebar.mobile-open { display: flex !important; width: 272px !important; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; box-shadow: var(--shadow-xl); }
    .sidebar-resizer, #sidebarCollapseMainBtn, #sidebarExpandBtn { display: none; }
    .topbar { display: flex; }
    .message { max-width: 95%; }
  }

  /* Chat */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 32px 40px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .chat-area:empty::after { content: ''; display: none; }

  /* Welcome */
  .welcome-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; text-align: center; padding: 40px;
    position: relative;
  }
  .welcome-screen::before {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 320px; height: 320px; background: radial-gradient(circle, rgba(0,82,255,.04) 0%, transparent 70%);
    pointer-events: none; border-radius: 50%;
  }
  .welcome-screen .w-icon {
    width: 96px; height: 96px; background: linear-gradient(135deg, var(--blue), var(--blue-light));
    border-radius: 24px; display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 700; color: #fff; margin-bottom: 28px; position: relative;
    box-shadow: 0 12px 32px rgba(0,82,255,.3); animation: float-icon 4s ease-in-out infinite;
  }
  .welcome-screen .w-icon::before {
    content: ''; position: absolute; inset: -8px; border-radius: 32px;
    border: 1.5px dashed rgba(0,82,255,.12); animation: ring-rotate 60s linear infinite;
  }
  .welcome-screen .w-icon::after {
    content: ''; position: absolute; inset: -16px; border-radius: 40px;
    border: 1px solid rgba(0,82,255,.05); animation: ring-rotate 80s linear infinite reverse;
  }
  .welcome-screen h2 {
    font-size: 28px; font-weight: 600; margin-bottom: 10px;
    font-family: 'Outfit', var(--font); letter-spacing: -.01em;
  }
  .welcome-screen h2 .biz { color: var(--blue); text-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .welcome-screen h2 .agent { color: var(--gray-600); text-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .welcome-screen p { color: var(--gray-500); max-width: 400px; line-height: 1.7; margin-bottom: 32px; font-size: 15px; }

  /* Welcome mode toggle */
  .welcome-mode-toggle {
    display: flex; gap: 0; padding: 4px; margin-top: 8px;
    background: var(--gray-100); border-radius: 12px;
  }
  .welcome-mode-toggle .wm-btn {
    padding: 12px 32px; border-radius: 9px; border: none;
    background: transparent; cursor: pointer;
    font-size: 15px; font-weight: 600; color: var(--gray-500);
    transition: all .25s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .welcome-mode-toggle .wm-btn:hover { color: var(--gray-700); }
  .welcome-mode-toggle .wm-btn.active {
    color: var(--blue); background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.03);
  }

  .welcome-screen.fade-out {
    opacity: 0; transform: translateY(8px) scale(.98);
    transition: all .35s cubic-bezier(.16,1,.3,1);
  }

  /* Messages */
  .message { display: flex; gap: 12px; max-width: 80%; animation: msgSlideIn .4s cubic-bezier(.16,1,.3,1); }
  @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 36px; height: 36px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
    flex-shrink: 0; margin-top: 2px;
  }
  .message.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: #fff;
    box-shadow: var(--shadow-accent);
  }
  .message.user .msg-avatar { background: var(--blue-bg); color: var(--blue); box-shadow: 0 2px 8px rgba(0,82,255,.12); }

  .msg-body {
    padding: 14px 18px; border-radius: var(--radius); line-height: 1.7; word-break: break-word;
    font-size: 14px; position: relative; letter-spacing: .01em;
  }
  .message.user .msg-body {
    background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: #fff;
    border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0,82,255,.25);
  }
  .message.assistant .msg-body {
    background: #fff; color: var(--gray-800); border: 1px solid var(--gray-200);
    box-shadow: var(--shadow-md); border-bottom-left-radius: 4px;
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .message.assistant .msg-body:hover {
    box-shadow: var(--shadow-lg); transform: translateY(-1px);
  }
  .message.assistant .msg-body.error {
    background: #fef2f2; color: var(--red); border-color: #fecaca;
  }

  .msg-body p { margin-bottom: 6px; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body a { color: var(--blue); text-decoration: none; font-weight: 500; }
  .msg-body a:hover { text-decoration: underline; opacity: .85; }

  .msg-file-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 8px;
    background: rgba(255,255,255,.12); color: rgba(255,255,255,.85);
  }
  .message.assistant .msg-file-badge { background: var(--gray-100); color: var(--gray-600); }

  /* Structured data */
  .biz-card {
    background: linear-gradient(135deg, var(--gray-50), #fff); border-radius: var(--radius-sm);
    padding: 14px 16px; margin: 8px 0; border: 1px solid var(--gray-200); box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .biz-card:first-child { margin-top: 0; }
  .biz-card:last-child { margin-bottom: 0; }
  .biz-card .k {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: var(--gray-400); margin-bottom: 2px;
  }
  .biz-card .v { font-size: 14px; color: var(--gray-800); font-weight: 500; }
  .biz-card .v.num { font-family: var(--font-mono); font-weight: 600; color: var(--blue); }

  .biz-table-wrap {
    overflow-x: auto; margin: 8px 0; border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
  }
  .biz-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .biz-table th {
    padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: .5px; color: var(--gray-500);
    background: linear-gradient(135deg, var(--gray-50), #fff); border-bottom: 1px solid var(--gray-200);
  }
  .biz-table td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
  .biz-table tr:hover td { background: var(--gray-50); }
  .biz-table tr:last-child td { border-bottom: none; }

  /* Loading */
  .loading-dots { display: flex; gap: 5px; padding: 6px 0; }
  .loading-dots span {
    width: 9px; height: 9px; border-radius: 50%; background: var(--blue-light);
    animation: bounce 1.3s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: .16s; }
  .loading-dots span:nth-child(3) { animation-delay: .32s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

  /* Input */
  .input-area { padding: 16px 40px 24px; background: rgba(255,255,255,.85); backdrop-filter: blur(12px); border-top: 1px solid var(--gray-200); box-shadow: 0 -1px 6px rgba(0,0,0,.03); }
  .input-wrap {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--gray-50); border: 1.5px solid var(--gray-200);
    border-radius: 14px; padding: 4px; transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(0,82,255,.1); background: #fff; }

  .input-wrap textarea {
    flex: 1; padding: 8px 12px; border: none; background: transparent;
    font-size: 14px; font-family: var(--font); resize: none; outline: none;
    line-height: 1.5; min-height: 40px; max-height: 120px; color: var(--gray-800);
  }
  .input-wrap textarea::placeholder { color: var(--gray-400); font-weight: 400; }

  .input-actions { display: flex; gap: 4px; padding: 4px; flex-shrink: 0; }

  .btn-ia {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; cursor: pointer; transition: var(--transition);
    background: transparent; color: var(--gray-400); position: relative; overflow: hidden;
  }
  .btn-ia:hover { background: var(--gray-200); color: var(--gray-600); transform: translateY(-1px); }
  .btn-ia.send {
    background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: #fff; font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,82,255,.25);
  }
  .btn-ia.send:hover { filter: brightness(1.1); box-shadow: 0 4px 14px rgba(0,82,255,.35); }
  .btn-ia.send:active { transform: scale(.95); }
  .btn-ia.send:disabled { background: var(--gray-300); cursor: not-allowed; }
  .btn-ia input[type=file] {
    position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
  }

  .file-badge {
    display: none; align-items: center; gap: 6px; flex-shrink: 0;
    padding: 0 12px; margin-bottom: 8px;
  }
  .file-badge.visible { display: flex; }
  .file-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; background: var(--blue-bg); border-radius: 6px;
    font-size: 12px; color: var(--blue); font-weight: 500;
    border: 1px solid rgba(0,82,255,.1);
  }
  .file-tag .remove { cursor: pointer; font-size: 16px; line-height: 1; color: var(--gray-400); margin-left: 2px; transition: var(--transition); }
  .file-tag .remove:hover { color: var(--red); }

  /* Quick chips */
  .quick-bar {
    display: flex; gap: 6px; padding: 0 40px 8px; flex-wrap: wrap; align-items: center;
  }
  .quick-chip {
    padding: 6px 16px; border-radius: 20px; border: 1px solid var(--gray-200);
    background: #fff; cursor: pointer; font-size: 12px; color: var(--gray-500);
    transition: var(--transition); white-space: nowrap; font-family: var(--font);
    box-shadow: 0 1px 2px rgba(0,0,0,.04); font-weight: 500;
  }
  .quick-chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); box-shadow: 0 2px 8px rgba(0,82,255,.12); transform: translateY(-1px); }
  .quick-chip:active { transform: scale(.96); }

  /* Chart toggle */
  .chart-toggle {
    display: none; align-items: center; gap: 6px; padding: 5px 14px;
    border-radius: 20px; border: 1.5px solid var(--blue); background: var(--blue); color: #fff;
    font-size: 11px; font-family: var(--font); cursor: pointer; font-weight: 600;
    transition: var(--transition); white-space: nowrap; user-select: none; letter-spacing: .02em;
    box-shadow: 0 2px 6px rgba(0,82,255,.2);
  }
  .chart-toggle.visible { display: inline-flex; }
  .chart-toggle:hover { box-shadow: 0 4px 12px rgba(0,82,255,.3); transform: translateY(-1px); }
  .chart-toggle.off { background: transparent; color: var(--gray-500); border-color: var(--gray-200); box-shadow: none; }
  .chart-toggle.off:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,82,255,.12); transform: translateY(-1px); }

  /* Role selector */
  .role-badge {
    margin-left: auto; font-size: 10px; padding: 3px 10px;
    border-radius: 20px; font-weight: 600; letter-spacing: .02em;
    transition: var(--transition); font-family: var(--font-mono);
  }
  .role-badge.admin { background: rgba(34,197,94,.12); color: #16a34a; border: 1px solid rgba(34,197,94,.2); }
  .role-badge.employee { background: rgba(245,158,11,.12); color: #d97706; border: 1px solid rgba(245,158,11,.2); }

  /* Role indicator banner */
  /* role-indicator removed */

  /* Quick chips — mode-specific visibility */
  .quick-chip[data-mode="quick"] { display: none; }
  .quick-chip[data-mode="analysis"] { display: none; }
  body.mode-quick .quick-chip[data-mode="quick"] { display: inline-block; }
  body.mode-analysis .quick-chip[data-mode="analysis"] { display: inline-block; }

  /* Animations */
  .fade-in { animation: fadeIn .4s cubic-bezier(.16,1,.3,1); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Design system animations */
  @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: .6; } }
  @keyframes float-icon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes float-slow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes ring-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes glow-pulse { 0%,100% { opacity: .4; } 50% { opacity: .8; } }
  @keyframes msgSlideIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* ===== Eval Floating Window ===== */
  .eval-float-btn {
    position: fixed; bottom: 80px; right: 24px; z-index: 999;
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: #fff; border: none; cursor: grab;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    box-shadow: 0 4px 16px rgba(0,82,255,.35);
    transition: var(--transition);
    touch-action: none;
  }
  .eval-float-btn:hover { cursor: grab; transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,82,255,.45); }
  .eval-float-btn:active { cursor: grabbing; transform: scale(.95); }

  .eval-window {
    position: fixed; right: 24px; bottom: 140px; z-index: 1000;
    width: 520px; max-height: 60vh;
    background: #fff; border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    box-shadow: var(--shadow-xl);
    display: none; flex-direction: column;
    overflow: hidden; resize: both;
    min-width: 380px; min-height: 300px;
  }
  .eval-window.visible { display: flex; }

  .eval-window-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--gray-200);
    cursor: move; user-select: none;
    background: var(--gray-50); flex-shrink: 0;
  }
  .eval-window-header .title { font-size: 14px; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 6px; }
  .eval-window-header .close-btn {
    width: 24px; height: 24px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer; font-size: 16px; color: var(--gray-400);
    display: flex; align-items: center; justify-content: center; transition: var(--transition);
  }
  .eval-window-header .close-btn:hover { background: var(--gray-200); color: var(--gray-600); }

  .eval-window-body {
    flex: 1; overflow-y: auto; padding: 16px;
  }
  .eval-window-body .section { margin-bottom: 16px; }
  .eval-window-body .section:last-child { margin-bottom: 0; }
  .eval-window-body .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-500); margin-bottom: 8px; }

  .eval-window .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .eval-window .stat-mini {
    background: var(--gray-50); border-radius: var(--radius-sm); padding: 10px 12px;
    border: 1px solid var(--gray-200);
  }
  .eval-window .stat-mini .lbl { font-size: 10px; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .eval-window .stat-mini .val { font-size: 18px; font-weight: 700; margin-top: 2px; font-family: var(--font-mono); }
  .eval-window .stat-mini .val.good { color: var(--green); }
  .eval-window .stat-mini .val.warn { color: var(--gold); }
  .eval-window .stat-mini .val.bad { color: var(--red); }
  .eval-window .stat-mini .val.normal { color: var(--blue); }

  .eval-window .mini-bar-container { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
  .eval-window .mini-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; transition: height .5s ease; }
  .eval-window .mini-bar-label { font-size: 7px; color: var(--gray-400); text-align: center; margin-top: 2px; }

  .eval-window .log-list { max-height: 160px; overflow-y: auto; }
  .eval-window .log-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px; font-size: 12px;
    border-bottom: 1px solid var(--gray-100);
  }
  .eval-window .log-item:hover { background: var(--gray-50); }
  .eval-window .log-item .li-time { color: var(--gray-400); font-size: 11px; white-space: nowrap; min-width: 32px; }
  .eval-window .log-item .li-intent { flex: 1; color: var(--gray-600); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .eval-window .log-item .li-latency { color: var(--gray-500); font-family: var(--font-mono); font-size: 11px; min-width: 40px; text-align: right; }

  .eval-window .refresh-line {
    display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 4px 0;
  }
  .eval-window .refresh-line button {
    padding: 3px 10px; border-radius: 6px; border: 1px solid var(--gray-200);
    background: #fff; cursor: pointer; font-size: 11px; color: var(--gray-500); transition: var(--transition); font-family: var(--font);
  }
  .eval-window .refresh-line button:hover { border-color: var(--blue); color: var(--blue); }

  .eval-window .eval-empty { padding: 20px; text-align: center; color: var(--gray-400); font-size: 12px; }

  .eval-window .detail-toggle {
    font-size: 11px; color: var(--blue); cursor: pointer; user-select: none;
    text-align: center; padding: 4px;
  }
  .eval-window .detail-toggle:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo">
        <div class="logo-icon">B</div>

    <div class="sidebar-content">

          <button class="mode-pill active" data-mode="quick">
            <span class="icon">⚡</span>
            <span>快速对话</span>

          </button>
        </div>
        <button class="btn-new btn-new-lg" id="btnNewSession">+ 新建对话</button>
      </div>

      <div class="sidebar-group">
        <div class="sidebar-group-title">身份选择</div>
        <div class="mode-pills" id="roleGroup">
          <button class="mode-pill active" data-role="admin">
            <span class="icon">⚙️</span>
            <span>管理端</span>
            <span class="role-badge admin">读写</span>
          </button>
          <button class="mode-pill" data-role="employee">
            <span class="icon">🛡️</span>
            <span>员工端</span>
            <span class="role-badge employee">只读</span>

        </div>
      </div>

      <div class="sidebar-group grow">
        <div class="sidebar-group-title">
          历史对话
          <span style="display:inline-flex;gap:2px;align-items:center;">
            <span class="refresh-btn" id="refreshHistory" title="刷新历史">&#8635;</span>
            <span class="clear-btn" id="btnDeleteAll" title="清空所有历史">&#10005;</span>
          </span>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">暂无历史记录</div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <span class="status-dot online" id="statusDot"></span>
      <span id="statusText">服务运行中</span>
    </div>
    <div class="sidebar-resizer" id="sidebarResizer"></div>
    <button class="sidebar-expand-btn" id="sidebarCollapseMainBtn" title="收起侧栏">◀</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <button class="sidebar-expand-btn" id="sidebarExpandBtn" title="展开侧栏">☰</button>
    <div class="topbar">
      <button class="toggle-sidebar" id="toggleSidebar">&#9776;</button>
      <h2 id="topbarTitle">BizAgent</h2>
    </div>

    <div class="chat-area" id="chatArea">
      <!-- Welcome screen shown by JS -->
    </div>

    <!-- Eval Floating Window -->
    <button class="eval-float-btn" id="evalFloatBtn" title="评估监控">&#9673;</button>
    <div class="eval-window" id="evalWindow">
      <div class="eval-window-header" id="evalWindowHeader">
        <span class="title">&#9673; 评估监控</span>
        <button class="close-btn" id="evalCloseBtn">&times;</button>
      </div>
      <div class="eval-window-body" id="evalWindowBody">
        <div class="section">
          <div class="stats-row">
            <div class="stat-mini"><div class="lbl">请求数</div><div class="val normal" id="ewTotal">-</div></div>
            <div class="stat-mini"><div class="lbl">平均延迟</div><div class="val normal" id="ewLatency">- ms</div></div>
            <div class="stat-mini"><div class="lbl">成功率</div><div class="val good" id="ewSuccess">-</div></div>
            <div class="stat-mini"><div class="lbl">幻觉率</div><div class="val good" id="ewHallucination">-</div></div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">延迟趋势</div>
          <div class="mini-bar-container" id="ewTrendChart"></div>
        </div>
        <div class="section">
          <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
            <span>最近日志</span>
            <span class="refresh-line">
              <span id="ewLogCount" style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--gray-400);font-size:11px;"></span>
              <button id="ewRefreshBtn">刷新</button>
            </span>
          </div>
          <div class="log-list" id="ewLogList">
            <div class="eval-empty">暂无数据</div>

        </div>
      </div>

    <div class="quick-bar" id="quickBar">
      <span class="chart-toggle off" id="chartToggle">
        <span id="chartToggleLabel">图表生成</span>
      </span>
      <button class="quick-chip" data-mode="quick" data-q="查一下各类别的销售额">各类别销售额</button>
      <button class="quick-chip" data-mode="quick" data-q="哪个地区卖得最好">最佳区域</button>
      <button class="quick-chip" data-mode="quick" data-q="Technology 品类销售情况">Technology</button>
      <button class="quick-chip" data-mode="quick" data-q="利润最高的产品有哪些">最盈利产品</button>
      <button class="quick-chip" data-mode="quick" data-q="Consumer 客户群消费多少">客户群消费</button>
      <button class="quick-chip" data-mode="quick" data-q="月度销售趋势如何">销售趋势</button>
      <button class="quick-chip" data-mode="quick" data-q="哪些产品在亏损">亏损产品</button>
      <button class="quick-chip" data-mode="quick" data-q="Superstore 整体销售概况">销售概况</button>
      <!-- analysis 模式快捷标签 -->
      <button class="quick-chip" data-mode="analysis" data-q="分析各品类销售额与利润对比">品类深度对比</button>
      <button class="quick-chip" data-mode="analysis" data-q="各区域销售业绩排名及利润分析">区域业绩分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="月度销售趋势与季节性分析">月度趋势分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="亏损产品的根因与改进分析">亏损根因分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="不同客户群消费行为对比">客户群行为分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="畅销产品特征与排行榜">畅销产品分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="按州分析销售分布与地理洞察">地理分布分析</button>
      <button class="quick-chip" data-mode="analysis" data-q="全维度经营状况综合分析报告">综合经营分析</button>

    <div class="input-area">
      <div class="file-badge" id="fileBadge">

        <textarea id="messageInput" rows="1" placeholder="输入您的问题…按 Enter 发送" maxlength="2000"></textarea>

          <button class="btn-ia" title="上传文件" id="fileBtn">
            📎
            <input type="file" id="fileInput" accept=".txt,.csv,.json,.md,.pdf,.docx,.xlsx,.xls,.log,.xml,.yaml,.yml,.png,.jpg,.jpeg">

<script>
(function() {
  'use strict';

  function genId() {
    if (crypto.randomUUID) return crypto.randomUUID().replace(/-/g, '').slice(0, 12);
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  const state = {
    mode: 'quick',
    role: 'admin',
    sessionId: genId(),
    fileData: null,
    fileName: '',
    loading: false,
    chartEnabled: false,
  };

  // DOM
  const chatArea = document.getElementById('chatArea');
  const inputEl = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const fileInput = document.getElementById('fileInput');
  const fileBtn = document.getElementById('fileBtn');
  const fileBadge = document.getElementById('fileBadge');
  const fileNameDisplay = document.getElementById('fileNameDisplay');
  const removeFileBtn = document.getElementById('removeFile');
  const btnNewSession = document.getElementById('btnNewSession');
  const modeGroup = document.getElementById('modeGroup');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const topbarTitle = document.getElementById('topbarTitle');
  const toggleSidebar = document.getElementById('toggleSidebar');
  const sidebar = document.getElementById('sidebar');

  function updateSessionDisplay() {}
  topbarTitle.textContent = 'BizAgent — 快速对话';
  document.body.className = 'mode-quick';

  // Desktop collapse/expand
  const sidebarCollapseMainBtn = document.getElementById('sidebarCollapseMainBtn');
  const sidebarExpandBtn = document.getElementById('sidebarExpandBtn');

  sidebarCollapseMainBtn.addEventListener('click', function() {
    sidebar.classList.add('collapsed');
    document.body.classList.add('sidebar-hidden');
  });

  sidebarExpandBtn.addEventListener('click', function() {
    sidebar.classList.remove('collapsed');
    document.body.classList.remove('sidebar-hidden');
  });

  // Resizable sidebar
  const sidebarResizer = document.getElementById('sidebarResizer');
  let isResizing = false;

  sidebarResizer.addEventListener('mousedown', function(e) {
    e.preventDefault();
    isResizing = true;
    this.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    const startX = e.clientX;
    const startWidth = parseInt(getComputedStyle(sidebar).width, 10);

    function onMove(e2) {
      if (!isResizing) return;
      var newWidth = Math.max(180, Math.min(500, startWidth + e2.clientX - startX));
      document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
    }

    function onUp() {
      if (!isResizing) return;
      isResizing = false;
      sidebarResizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Responsive sidebar toggle
  toggleSidebar.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
  });
  document.addEventListener('click', function(e) {
    if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open') && !sidebar.contains(e.target) && !toggleSidebar.contains(e.target)) {
      sidebar.classList.remove('mobile-open');
    }
  });

  // Mode switching
  modeGroup.addEventListener('click', function(e) {
    const btn = e.target.closest('.mode-pill');
    if (!btn) return;
    const mode = btn.dataset.mode;
    if (mode === state.mode) return;
    state.mode = mode;
    document.body.className = 'mode-' + mode;
    // Switch mode = new conversation
    state.sessionId = genId();
    updateSessionDisplay();
    chatArea.innerHTML = '';
    state.fileData = null; state.fileName = '';
    fileBadge.classList.remove('visible'); fileInput.value = '';
    showWelcome();

    modeGroup.querySelectorAll('.mode-pill').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var names = { quick: '快速对话', smart: '快速对话(旧)', analysis: '深度分析' };
    topbarTitle.textContent = 'BizAgent — ' + (names[mode] || mode);
    document.getElementById('chartToggle').classList.toggle('visible', mode === 'analysis');
    var ws = document.getElementById('welcomeScreen');
    if (ws) {
      var desc = document.getElementById('welcomeDesc');
      if (desc) desc.textContent = getWelcomeText(mode);
    }
    if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
  });

  // Role switching (no indicator bar)
  var roleGroup = document.getElementById('roleGroup');

  function updateRoleUI(role) {
    state.role = role;
    roleGroup.querySelectorAll('.mode-pill').forEach(function(b) { b.classList.remove('active'); });
    roleGroup.querySelector('[data-role="' + role + '"]').classList.add('active');
  }

  roleGroup.addEventListener('click', function(e) {
    var btn = e.target.closest('.mode-pill');
    if (!btn) return;
    var role = btn.dataset.role;
    if (role === state.role) return;
    updateRoleUI(role);
    // 切换身份 = 新开对话
    state.sessionId = genId();
    updateSessionDisplay();
    chatArea.innerHTML = '';
    state.fileData = null; state.fileName = '';
    fileBadge.classList.remove('visible'); fileInput.value = '';
    showWelcome();
    if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
  });

  // Session
  btnNewSession.addEventListener('click', function() {
    state.sessionId = genId();
    updateSessionDisplay();
    chatArea.innerHTML = '';
    state.fileData = null; state.fileName = '';
    fileBadge.classList.remove('visible'); fileInput.value = '';
    showWelcome();
    if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
  });

  // Delete all history

  function esc(s) {
    var d = document.createElement('div');

  function renderBizResponse(container, data) {
    const d = data.data || data;
    if (typeof d === 'string') { container.innerHTML = '<p>' + esc(d) + '</p>'; return; }
    if (!d || typeof d !== 'object') { container.innerHTML = '<p>' + esc(JSON.stringify(data)) + '</p>'; return; }

    var answerText = d.回答 || d.answer;
    if (answerText !== undefined && answerText !== null) {
      var answerPara = document.createElement('div');
      answerPara.style.cssText = 'font-size:15px; line-height:1.8; color:var(--gray-800);';
      var paragraphs = String(answerText).split('\n\n');
      paragraphs.forEach(function(para) {
        para = para.trim();
        if (!para) return;
        var p = document.createElement('p');
        p.style.cssText = 'margin-bottom:8px;';
        p.innerHTML = para.split('\n').map(function(line) { return esc(line); }).join('<br>');
        answerPara.appendChild(p);
      });
      container.appendChild(answerPara);
    }

    // 收集 answer 之外的所有字段，统一放入可折叠的详情区域
    var detailObj = d.详情 || d.details || {};
    if (typeof detailObj !== 'object') detailObj = {};
    for (var key in d) {
      if (!d.hasOwnProperty(key)) continue;
      if (key === 'status' || key === 'answer' || key === 'details' || key === '回答' || key === '详情') continue;
      if (!(key in detailObj)) detailObj[key] = d[key];
    }
    var detailKeys = Object.keys(detailObj);
    if (detailKeys.length > 0) {
      var detailToggle = document.createElement('div');
      detailToggle.style.cssText = 'margin-top:' + (answerText ? '12px' : '0') + '; font-size:12px; color:var(--blue); cursor:pointer; user-select:none;';
      detailToggle.textContent = '▶ 查看详细数据';
      var detailContent = document.createElement('div');
      detailContent.style.cssText = 'display:none; margin-top:8px;';
      var detailDiv = renderObj(detailObj);
      detailDiv.style.cssText = 'background:var(--gray-50); border-radius:6px; padding:12px; font-size:13px; line-height:1.6; border:1px solid var(--gray-200);';
      detailContent.appendChild(detailDiv);
      detailToggle.addEventListener('click', function() {
        var expanded = detailContent.style.display !== 'none';
        detailContent.style.display = expanded ? 'none' : 'block';
        detailToggle.textContent = expanded ? '▶ 查看详细数据' : '▼ 收起详细数据';
      });
      container.appendChild(detailToggle);
      container.appendChild(detailContent);
    }
  }

  function renderFieldValue(container, val) {
    if (val === null || val === undefined) { container.textContent = '-'; return; }
    if (Array.isArray(val)) {
      if (val.length === 0) { container.textContent = '暂无数据'; return; }
      if (typeof val[0] === 'object') {
        var wrap = document.createElement('div');
        wrap.className = 'biz-table-wrap';
        var tbl = document.createElement('table');
        tbl.className = 'biz-table';
        var thead = document.createElement('thead');
        var tr = document.createElement('tr');
        var headers = Object.keys(val[0]);
        headers.forEach(function(h) {
          var th = document.createElement('th');
          th.textContent = fmtKey(h);
          tr.appendChild(th);
        });
        thead.appendChild(tr);
        tbl.appendChild(thead);
        var tbody = document.createElement('tbody');
        val.forEach(function(row) {
          var r = document.createElement('tr');
          headers.forEach(function(h) {
            var td = document.createElement('td');
            td.textContent = row[h] !== null && row[h] !== undefined ? String(row[h]) : '-';
            r.appendChild(td);
          });
          tbody.appendChild(r);
        });
        tbl.appendChild(tbody);
        wrap.appendChild(tbl);
        container.appendChild(wrap);
      } else {
        container.textContent = val.join('、');
      }
      return;
    }
    if (typeof val === 'object') {
      container.appendChild(renderObj(val));
      return;
    }
    var isNum = typeof val === 'number' || (!isNaN(parseFloat(val)) && String(val).match(/^[\d,.]+$/));
    if (isNum) { container.className += ' num'; }
    container.textContent = val !== null && val !== undefined ? String(val) : '-';
  }

  function renderObj(obj) {
    var div = document.createElement('div');
    if (!obj || typeof obj !== 'object') { div.textContent = String(obj || '-'); return div; }

      var line = document.createElement('div');
      line.style.cssText = 'margin:3px 0; font-size:13px;';
      var v = obj[k];
      if (v !== null && v !== undefined && typeof v === 'object') {

        line.innerHTML = '<strong>' + fmtKey(k) + ':</strong>';
        line.appendChild(inner);
      } else {
        line.innerHTML = '<strong>' + fmtKey(k) + ':</strong> ' + esc(v !== null && v !== undefined ? String(v) : '-');
      }
      div.appendChild(line);
    }
    return div;
  }

  async function sendMessage() {
    if (state.loading) return;
    var text = inputEl.value.trim();
    if (!text && !state.fileData) return;

    state.loading = true; sendBtn.disabled = true;

    var ws = document.getElementById('welcomeScreen');
    if (ws) ws.remove();

    addMessage('user', text || '(上传文件)', state.fileName ? {fileName: state.fileName} : null);
    inputEl.value = ''; inputEl.style.height = 'auto';
    showLoading();

    var msg = text || '请分析上传的文件';
    if (state.mode === 'analysis' && state.chartEnabled) {
      if (msg.slice(-1) !== '。') msg += '。';
      msg += '生成图表。';
    }
    var payload = {
      message: msg,
      mode: state.mode,
      session_id: state.sessionId,
      enable_persistence: true,
      role: state.role,
    };
    if (state.fileData) {
      payload.file_content = state.fileData;
      payload.file_name = state.fileName;
      state.fileData = null; state.fileName = '';
      fileBadge.classList.remove('visible'); fileInput.value = '';
    }
    if (state.mode === 'analysis') {
      payload.generate_chart = state.chartEnabled;
    }

    try {
      var resp = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      var result = await resp.json();
      hideLoading();
      addResponse(result);
    } catch (err) {
      hideLoading();
      addResponse({ error: err.message || '网络错误' });
    }
    state.loading = false; sendBtn.disabled = false; inputEl.focus();
  }

  // History
  var historyList = document.getElementById('historyList');

  function timeAgo(iso) {
    if (!iso) return '';
    var t = new Date(iso);
    var now = new Date();
    var diff = Math.floor((now - t) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + ' 天前';
    return t.toLocaleDateString('zh-CN');
  }

  function renderHistory(sessions) {
    historyList.innerHTML = '';
    if (!sessions || sessions.length === 0) {
      historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
      return;
    }
    sessions.forEach(function(s) {
      var item = document.createElement('div');
      item.className = 'history-item';
      var sid = s.id || s.session_id;
      item.setAttribute('data-sid', sid);
      if (sid === state.sessionId) item.classList.add('active');

      var preview = document.createElement('div');
      preview.className = 'h-preview';
      preview.textContent = s.preview || '(空对话)';

      var meta = document.createElement('div');
      meta.className = 'h-meta';

      var time = document.createElement('span');
      time.textContent = timeAgo(s.updated_at);

      var count = document.createElement('span');
      count.className = 'h-count';
      count.textContent = (s.message_count || 0) + ' 条';

      meta.appendChild(time);
      meta.appendChild(count);

      var delBtn = document.createElement('span');
      delBtn.className = 'h-del';
      delBtn.textContent = '×';
      delBtn.title = '删除此对话';
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteSession(sid);
      });
      meta.appendChild(delBtn);

      item.appendChild(preview);
      item.appendChild(meta);

      item.addEventListener('click', function() { loadSession(sid); });
      historyList.appendChild(item);
    });
  }

  async function loadHistory() {
    refreshBtn.classList.add('spin');
    try {
      var resp = await fetch('/api/history');
      var result = await resp.json();
      if (result.success && result.data) {
        renderHistory(result.data);
      }
    } catch(e) {
      console.warn('加载历史失败:', e);
    }
    refreshBtn.classList.remove('spin');
  }

  async function deleteSession(sessionId) {
    if (!confirm('确定要删除此对话吗？')) return;
    try {
      var resp = await fetch('/api/sessions/' + sessionId, { method: 'DELETE' });
      var result = await resp.json();
      if (result.success || result.deleted) {
        if (sessionId === state.sessionId) {
          state.sessionId = genId();
          updateSessionDisplay();
          chatArea.innerHTML = '';
          showWelcome();
        }
        loadHistory();
      }
    } catch(e) {
      console.warn('删除失败:', e);
    }
  }

  function renderHistoryMessage(msg) {
    var div = document.createElement('div');
    div.className = 'message ' + msg.role;
    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = msg.role === 'user' ? 'U' : 'B';
    div.appendChild(avatar);
    var body = document.createElement('div');
    body.className = 'msg-body';
    if (msg.role === 'user') {
      body.innerHTML = '<p>' + esc(msg.content) + '</p>';
    } else {
      try {
        var parsed = JSON.parse(msg.content);
        renderBizResponse(body, parsed);
      } catch(e) {
        body.innerHTML = '<p>' + esc(msg.content) + '</p>';
      }
    }
    div.appendChild(body);
    return div;
  }

  async function loadSession(sessionId) {
    state.sessionId = sessionId;
    updateSessionDisplay();

    try {
      var resp = await fetch('/api/sessions/' + sessionId + '/messages?limit=200');
      var result = await resp.json();
      if (!result.success) {
        chatArea.innerHTML = '<div class="welcome-screen"><p style="color:var(--red)">加载失败: ' + esc(result.error) + '</p></div>';
        return;
      }

      chatArea.innerHTML = '';
      var ws = document.getElementById('welcomeScreen');
      if (ws) ws.remove();

      (result.data || []).forEach(function(msg) {
        var el = renderHistoryMessage(msg);
        chatArea.appendChild(el);
      });
      chatArea.scrollTop = chatArea.scrollHeight;

      historyList.querySelectorAll('.history-item').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-sid') === sessionId);
      });

    } catch(e) {
      chatArea.innerHTML = '<div class="welcome-screen"><p style="color:var(--red)">网络错误: ' + esc(e.message) + '</p></div>';
    }
  }

  if (evalBtn && evalWin) {
    function syncWinPos() {
      var br = evalBtn.getBoundingClientRect();
      // window to the LEFT of button, button at window's top-right corner
      var winRight = Math.max(10, window.innerWidth - br.left + 8);
      evalWin.style.right = winRight + 'px';
      evalWin.style.top = br.top + 'px';
      evalWin.style.bottom = 'auto';
      evalWin.style.left = 'auto';

    function btnStartDrag(e) {
      var ce = e.touches ? e.touches[0] : e;
      var rect = evalBtn.getBoundingClientRect();
      dragState = {
        offsetX: ce.clientX - rect.left,
        offsetY: ce.clientY - rect.top,
        moved: false,
      };
      dragTarget = 'btn';
      evalBtn.style.transition = 'none';
      document.body.style.cursor = 'grabbing';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    }

    var winDragHandle = evalWin.querySelector('.eval-window-header') || evalWin;

    function winStartDrag(e) {
      var ce = e.touches ? e.touches[0] : e;
      if (ce.target.closest('.close-btn') || ce.target.closest('button')) return;
      dragState = {
        offsetX: ce.clientX - evalWin.getBoundingClientRect().left,
        offsetY: ce.clientY - evalWin.getBoundingClientRect().top,
      };
      dragTarget = 'win';
      evalWin.style.transition = 'none';
      e.preventDefault();
    }

    function moveDrag(e) {
      if (!dragState || !dragTarget) return;
      var ce = e.touches ? e.touches[0] : e;
      if (dragTarget === 'btn') {
        dragState.moved = true;
        var btnLeft = ce.clientX - dragState.offsetX;
        var btnTop = ce.clientY - dragState.offsetY;
        var newRight = window.innerWidth - btnLeft - evalBtn.offsetWidth;
        var newBottom = window.innerHeight - btnTop - evalBtn.offsetHeight;
        newRight = Math.max(10, Math.min(window.innerWidth - 60, newRight));
        newBottom = Math.max(10, Math.min(window.innerHeight - 60, newBottom));
        evalBtn.style.right = newRight + 'px';
        evalBtn.style.bottom = newBottom + 'px';
        evalBtn.style.left = 'auto';
        evalBtn.style.top = 'auto';
        syncWinPos();
      } else {
        var newLeft = ce.clientX - dragState.offsetX;
        var newTop = ce.clientY - dragState.offsetY;
        newLeft = Math.max(0, Math.min(window.innerWidth - evalWin.offsetWidth, newLeft));
        newTop = Math.max(0, Math.min(window.innerHeight - evalWin.offsetHeight, newTop));
        evalWin.style.left = newLeft + 'px';
        evalWin.style.right = 'auto';
        evalWin.style.top = newTop + 'px';
        evalWin.style.bottom = 'auto';
      }
      e.preventDefault();
    }

    var _btnMoved = false;

    function stopDrag(e) {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      evalBtn.style.transition = '';
      evalWin.style.transition = '';
      if (dragTarget === 'btn' && dragState) {
        _btnMoved = dragState.moved;
      }
      dragState = null;
      dragTarget = null;
    }

    evalBtn.addEventListener('mousedown', function(e) { _btnMoved = false; btnStartDrag(e); });
    winDragHandle.addEventListener('mousedown', winStartDrag);
    document.addEventListener('mousemove', moveDrag);
    document.addEventListener('mouseup', stopDrag);
    evalBtn.addEventListener('touchstart', function(e) { _btnMoved = false; btnStartDrag(e); }, {passive: false});
    winDragHandle.addEventListener('touchstart', winStartDrag, {passive: false});
    document.addEventListener('touchmove', moveDrag, {passive: false});
    document.addEventListener('touchend', stopDrag);

    // Button click = toggle window (no toggle if dragged)
    evalBtn.addEventListener('click', function(e) {
      if (_btnMoved) { _btnMoved = false; return; }
      syncWinPos();
      var isVisible = evalWin.classList.contains('visible');
      evalWin.classList.toggle('visible');
      if (!isVisible) loadEvalData();
    });

    if (evalCloseBtn) {
      evalCloseBtn.addEventListener('click', function() { evalWin.classList.remove('visible'); });
    }

    var ewRefreshBtn = document.getElementById('ewRefreshBtn');
    if (ewRefreshBtn) ewRefreshBtn.addEventListener('click', loadEvalData);
  }

  async function loadEvalData() {
    try {
      var r1 = await fetch('/api/eval/stats?days=7');
      var stats = await r1.json();
      var r2 = await fetch('/api/eval/logs?limit=20');
      var logs = await r2.json();
      if (stats.success && stats.data) renderEvalStats(stats.data);
      if (logs.success && logs.data) renderEvalLogs(logs.data);
    } catch(e) { console.warn('评估数据加载失败:', e); }
  }

  function renderEvalStats(data) {
    var total = data.total || 0;
    var avgLat = data.avg_latency_ms || 0;
    var sr = data.success_rate || 0;
    var hr = data.hallucination_rate || 0;

    setEwStat('ewTotal', total, 'normal');
    setEwStat('ewLatency', avgLat + ' ms', avgLat > 5000 ? 'bad' : avgLat > 2000 ? 'warn' : 'normal');
    setEwStat('ewSuccess', sr + '%', sr >= 95 ? 'good' : sr >= 80 ? 'warn' : 'bad');
    setEwStat('ewHallucination', hr + '%', hr <= 5 ? 'good' : hr <= 15 ? 'warn' : 'bad');

    // Trend chart
    var trend = data.daily_trend || [];
    var tc = document.getElementById('ewTrendChart');
    tc.innerHTML = '';
    if (trend.length === 0) { tc.innerHTML = '<div class="eval-empty">暂无趋势数据</div>'; }
    else {
      var maxLat = Math.max.apply(null, trend.map(function(t) { return t.avg_latency_ms || 0; })) || 1;
      trend.forEach(function(t) {
        var wrap = document.createElement('div');
        wrap.className = 'mini-bar-wrap';
        wrap.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;';
        var bar = document.createElement('div');
        bar.className = 'mini-bar';
        var pct = Math.max(2, ((t.avg_latency_ms || 0) / maxLat) * 55);
        bar.style.height = pct + 'px';
        bar.style.background = t.avg_latency_ms > 3000 ? 'var(--red)' : 'var(--blue)';
        var label = document.createElement('div');
        label.className = 'mini-bar-label';
        label.textContent = (t.date || '').slice(5);
        wrap.appendChild(bar);
        wrap.appendChild(label);
        tc.appendChild(wrap);
      });
    }
  }

  function setEwStat(id, val, cls) {
    var el = document.getElementById(id);
    if (el) { el.textContent = val; el.className = 'val ' + cls; }
  }

  function renderEvalLogs(logs) {
    var list = document.getElementById('ewLogList');
    var countEl = document.getElementById('ewLogCount');
    list.innerHTML = '';
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="eval-empty">暂无评估日志</div>';
      if (countEl) countEl.textContent = '';
      return;
    }
    if (countEl) countEl.textContent = logs.length + ' 条';
    logs.forEach(function(log) {
      var item = document.createElement('div');
      item.className = 'log-item';

      var time = document.createElement('span');
      time.className = 'li-time';
      var t = log.created_at || '';
      time.textContent = t.length > 10 ? t.slice(5, 10) : t;

      var intent = document.createElement('span');
      intent.className = 'li-intent';
      intent.textContent = (log.intent || 'N/A').slice(0, 20);

      var lat = document.createElement('span');
      lat.className = 'li-latency';
      lat.textContent = log.latency_ms ? (log.latency_ms < 1000 ? log.latency_ms + 'ms' : (log.latency_ms / 1000).toFixed(1) + 's') : '-';

      var dot = document.createElement('span');
      dot.style.cssText = 'width:6px;height:6px;border-radius:50%;flex-shrink:0;';
      if (log.hallucination) dot.style.background = 'var(--gold)';
      else if (log.status === 'failed') dot.style.background = 'var(--red)';
      else dot.style.background = 'var(--green)';

      item.appendChild(dot);
      item.appendChild(time);
      item.appendChild(intent);
      item.appendChild(lat);
      list.appendChild(item);
    });
  }

  // Auto-refresh every 30s while visible
  setInterval(function() {
    if (evalWin && evalWin.classList.contains('visible')) loadEvalData();
  }, 30000);
})();
</script>
</body>
</html>
